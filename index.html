<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claspeek</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a1a; background: #fff; }
        .container { max-width: 640px; margin: 0 auto; padding: 60px 24px; }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
        .subtitle { font-size: 18px; color: #666; margin-bottom: 48px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a { display: block; padding: 16px 20px; border: 1px solid #e0e0e0; border-radius: 12px; text-decoration: none; color: #1a1a1a; font-size: 16px; transition: background 0.2s; }
        .links a:hover { background: #f5f5f5; }
        .links a span { color: #888; font-size: 14px; display: block; margin-top: 4px; }
        footer { margin-top: 60px; font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Claspeek</h1>
        <p class="subtitle">학생 익명 커뮤니티 & 플래너</p>
        <div class="links">
            <a href="/terms/">
                이용약관
                <span>Terms of Service</span>
            </a>
            <a href="/privacy/">
                개인정보 처리방침
                <span>Privacy Policy</span>
            </a>
            <a href="/support/">
                고객 지원
                <span>Support</span>
            </a>
        </div>
        <footer>&copy; 2026 Claspeek. All rights reserved.</footer>
    </div>
</body>
</html>
